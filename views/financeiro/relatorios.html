<section class="view financeiro" data-financeiro-view="relatorios">
  <header class="gu-card__topo">
    <div class="gu-card__titulo-grupo">
      <span class="material-icons gu-card__icone">description</span>
      <div>
        <h2 class="gu-card__titulo">Relatórios</h2>
        <p class="gu-card__subtitulo">Consolide entradas, saídas, inadimplência e resultados por período.</p>
      </div>
    </div>
    <button type="button" class="btn btn-secundario" id="btn-exportar-relatorio">
      <span class="material-icons">download</span>
      Exportar
    </button>
  </header>

  <section class="financeiro__painel">
    <div class="financeiro__painel-cabecalho">
      <h2 class="financeiro__secao-titulo">Filtros do relat&oacute;rio</h2>
      <div class="financeiro__filtros financeiro__filtros--relatorio">
        <input class="form-input" type="month" id="relatorio-inicio" aria-label="M&ecirc;s inicial" />
        <input class="form-input" type="month" id="relatorio-fim" aria-label="M&ecirc;s final" />
        <select class="form-input" id="relatorio-tipo" aria-label="Tipo de relat&oacute;rio">
          <option value="todos">Receitas e despesas</option>
          <option value="receita">Somente receitas</option>
          <option value="despesa">Somente despesas</option>
        </select>
      </div>
    </div>
  </section>

  <div class="financeiro__metricas" id="relatorio-metricas"></div>

  <section class="financeiro__grid-2">
    <div class="financeiro__painel">
      <h2 class="financeiro__secao-titulo">Resultado mensal</h2>
      <div class="financeiro__barras" id="relatorio-barras"></div>
    </div>
    <div class="financeiro__painel">
      <h2 class="financeiro__secao-titulo">Resumo por conta</h2>
      <div class="financeiro__lista-contas" id="relatorio-contas"></div>
    </div>
  </section>
</section>
