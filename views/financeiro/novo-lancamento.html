<section class="view financeiro" data-financeiro-view="novo-lancamento">
  <div class="gu-card">
  <header class="gu-card__topo">
    <div class="gu-card__titulo-grupo">
      <span class="material-icons gu-card__icone">add_card</span>
      <div>
        <h2 class="gu-card__titulo">Novo Lançamento</h2>
        <p class="gu-card__subtitulo">Registre receitas, despesas, mensalidades, acordos e pagamentos operacionais.</p>
      </div>
    </div>
    <a href="#/financeiro/visao-geral" class="btn btn-secundario">
      <span class="material-icons">arrow_back</span>
      Voltar
    </a>
  </header>

  <form class="financeiro__formulario" id="form-lancamento">
    <section class="financeiro__painel financeiro__painel--form">
      <h2 class="financeiro__secao-titulo">Dados do lan&ccedil;amento</h2>
      <div class="form-grid">
        <div class="campo form-col-3">
          <label class="form-label form-label-obrigatorio" for="lancamento-tipo">Tipo</label>
          <select class="form-input" id="lancamento-tipo" required>
           <option value="1">Anuidade</option>
           <option value="2">Mensalidade</option>
           <option value="3">Doação</option>
           <option value="4">Multa</option>
           <option value="5">Outro</option>
          </select>
        </div>
        <div class="campo form-col-3">
          <label class="form-label form-label-obrigatorio" for="lancamento-status">Status</label>
          <select class="form-input" id="lancamento-status" required>
           <option value="1">Aberto</option>
           <option value="2">Liquidado</option>
           <option value="3">Cancelado</option>
          </select>
        </div>
<div class="campo form-col-3">
  <label class="form-label form-label-obrigatorio" for="lancamento-forma-pagamento">
    Forma de pagamento
  </label>
       <select class="form-input" id="lancamento-forma-pagamento" required>
           <option value="1">PIX</option>
           <option value="2">Boleto</option>
           <option value="3">Cartão de crédito</option>
           <option value="4">Cartão de débito</option>
           <option value="5">Dinheiro</option>
           <option value="6">Transferência bancária</option>
         </select>
        </div>  

        <div class="campo form-col-3">
          <label class="form-label form-label-obrigatorio" for="lancamento-valor">Valor</label>
          <input class="form-input" id="lancamento-valor" type="number" min="0" step="0.01" placeholder="0,00" required />
        </div>
        <div class="campo form-col-3">
          <label class="form-label form-label-obrigatorio" for="lancamento-vencimento">Vencimento</label>
          <input class="form-input" id="lancamento-vencimento" type="date" required />
        </div>
        <div class="campo form-col-6">
          <label class="form-label form-label-obrigatorio" for="lancamento-descricao">Descri&ccedil;&atilde;o</label>
          <input class="form-input" id="lancamento-descricao" type="text" placeholder="Ex.: Mensalidade de associado" required />
        </div>
        <div class="campo form-col-3">
          <label class="form-label" for="lancamento-conta">Conta regente</label>
          <select class="form-input" id="lancamento-conta">
            <option value="1">Receitas associativas</option>
            <option value="2">Eventos e reservas</option>
            <option value="3">Despesas administrativas</option>
            <option value="4">Manutenção e obras</option>
          </select>
        </div>
        <div class="campo form-col-3">
          <label class="form-label" for="lancamento-subconta">Conta subordinada</label>
          <select class="form-input" id="lancamento-subconta">
            <option value="1">Mensalidades</option>
            <option value="2">Reserva de espaço</option>
            <option value="3">Material de consumo</option>
            <option value="4">Serviços contratados</option>
          </select>
        </div>
        <div class="campo form-col-4">
          <label class="form-label" for="lancamento-pessoa">Associado, parceiro ou fornecedor</label>
          <input class="form-input" id="lancamento-pessoa" type="text" placeholder="Nome relacionado" />
        </div>
        <div class="campo form-col-4">
          <label class="form-label" for="lancamento-competencia">Compet&ecirc;ncia</label>
          <input class="form-input" id="lancamento-competencia" type="month" />
        </div>
        <div class="campo form-col-4">
          <label class="form-label" for="lancamento-pagamento">Data de pagamento</label>
          <input class="form-input" id="lancamento-pagamento" type="date" />
        </div>
        <div class="campo form-col-12">
          <label class="form-label" for="lancamento-observacao">Observa&ccedil;&otilde;es</label>
          <textarea class="form-input" id="lancamento-observacao" rows="4" placeholder="Detalhes internos do lan&ccedil;amento"></textarea>
        </div>
      </div>
    </section>

    <aside class="financeiro__resumo-form">
      <h2 class="financeiro__secao-titulo">Resumo</h2>
      <dl class="financeiro__dl">
        <div><dt>Tipo</dt><dd id="resumo-tipo">Receita</dd></div>
        <div><dt>Status</dt><dd id="resumo-status">Pendente</dd></div>
        <div><dt>Valor</dt><dd id="resumo-valor">R$ 0,00</dd></div>
      </dl>
      <button type="submit" class="btn btn-primario btn-bloco">
        <span class="material-icons">save</span>
        Salvar lan&ccedil;amento
      </button>
      <button type="reset" class="btn btn-secundario btn-bloco">
        <span class="material-icons">restart_alt</span>
        Limpar campos
      </button>
    </aside>
  </form>
  </div><!-- /.gu-card -->
</section>
