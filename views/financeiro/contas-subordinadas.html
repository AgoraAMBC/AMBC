<section class="view financeiro" data-financeiro-view="contas-subordinadas">
  <header class="financeiro__cabecalho">
    <div>
      <p class="financeiro__eyebrow">Plano de contas</p>
      <h1 class="financeiro__titulo">Contas subordinadas</h1>
      <p class="financeiro__subtitulo">Detalhe as contas regentes para melhorar filtros, relatorios e prestacao de contas.</p>
    </div>
  </header>

  <section class="financeiro__grid-gestao">
    <form class="financeiro__painel" id="form-conta-subordinada">
      <h2 class="financeiro__secao-titulo">Cadastrar conta subordinada</h2>
      <div class="campo">
        <label class="form-label form-label-obrigatorio" for="subordinada-regente">Conta regente</label>
        <select class="form-input" id="subordinada-regente" required></select>
      </div>
      <div class="campo">
        <label class="form-label form-label-obrigatorio" for="subordinada-nome">Nome</label>
        <input class="form-input" id="subordinada-nome" type="text" placeholder="Ex.: Mensalidades" required />
      </div>
      <div class="campo">
        <label class="form-label" for="subordinada-descricao">Descricao</label>
        <textarea class="form-input" id="subordinada-descricao" rows="3" placeholder="Uso esperado desta subconta"></textarea>
      </div>
      <button class="btn btn-primario btn-bloco" type="submit">
        <span class="material-icons">add</span>
        Adicionar subconta
      </button>
    </form>

    <div class="financeiro__painel">
      <div class="financeiro__painel-cabecalho">
        <h2 class="financeiro__secao-titulo">Subcontas cadastradas</h2>
        <select class="form-input financeiro__busca" id="filtro-subordinada-regente" aria-label="Filtrar por conta regente"></select>
      </div>
      <div class="tabela-responsiva">
        <table class="tabela financeiro__tabela">
          <thead>
            <tr>
              <th>Subconta</th>
              <th>Conta regente</th>
              <th>Movimentacoes</th>
              <th>Status</th>
              <th class="tabela__th-acoes">Acoes</th>
            </tr>
          </thead>
          <tbody id="contas-subordinadas-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>
</section>
