<!-- =========================================================
  View: Tabelas Auxiliares
  Descricao: Gerencie os valores padrão utilizados nos formulários
========================================================= -->
<section class="view tabaux">

  <div class="gu-card">

    <!-- Topo dinâmico — atualizado pelo JS ao trocar de aba -->
    <div class="gu-card__topo">
      <div class="gu-card__titulo-grupo">
        <span class="material-icons gu-card__icone" id="tabaux-icone">wc</span>
        <div>
          <h2 class="gu-card__titulo" id="tabaux-titulo">Gênero</h2>
          <p class="gu-card__subtitulo" id="tabaux-subtitulo">Carregando…</p>
        </div>
      </div>
      <button type="button" class="gu-btn gu-btn--primario" id="tabaux-btn-add" data-tabaux-adicionar="genero">
        <span class="material-icons">add</span>
        <span id="tabaux-btn-texto">Adicionar Gênero</span>
      </button>
    </div>

    <!-- ABAS -->
    <div class="tabaux__abas" role="tablist">
      <button class="tabaux__aba tabaux__aba--ativa" role="tab" aria-selected="true"  data-tabaux-aba="genero"      aria-controls="tabaux-genero">
        <span class="material-icons">wc</span> Gênero
      </button>
      <button class="tabaux__aba" role="tab" aria-selected="false" data-tabaux-aba="parentesco"  aria-controls="tabaux-parentesco">
        <span class="material-icons">account_tree</span> Parentesco
      </button>
      <button class="tabaux__aba" role="tab" aria-selected="false" data-tabaux-aba="profissao"   aria-controls="tabaux-profissao">
        <span class="material-icons">work</span> Profissão
      </button>
      <button class="tabaux__aba" role="tab" aria-selected="false" data-tabaux-aba="estadocivil" aria-controls="tabaux-estadocivil">
        <span class="material-icons">favorite</span> Estado Civil
      </button>
      <button class="tabaux__aba" role="tab" aria-selected="false" data-tabaux-aba="status"      aria-controls="tabaux-status">
        <span class="material-icons">toggle_on</span> Status
      </button>
    </div>

    <!-- ── GÊNERO ── -->
    <div class="tabaux__painel tabaux__painel--ativo" id="tabaux-genero" role="tabpanel">
      <div class="gu-tabela-wrapper">
        <table class="gu-tabela">
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th>Nome do Gênero</th>
              <th class="gu-tabela__th--acoes">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-genero">
            <tr><td colspan="3" class="gu-tabela__estado">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── PARENTESCO ── -->
    <div class="tabaux__painel" id="tabaux-parentesco" role="tabpanel" hidden>
      <div class="gu-tabela-wrapper">
        <table class="gu-tabela">
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th>Parentesco</th>
              <th class="gu-tabela__th--acoes">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-parentesco">
            <tr><td colspan="3" class="gu-tabela__estado">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── PROFISSÃO ── -->
    <div class="tabaux__painel" id="tabaux-profissao" role="tabpanel" hidden>
      <div class="gu-tabela-wrapper">
        <table class="gu-tabela">
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th>Profissão</th>
              <th class="gu-tabela__th--acoes">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-profissao">
            <tr><td colspan="3" class="gu-tabela__estado">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── ESTADO CIVIL ── -->
    <div class="tabaux__painel" id="tabaux-estadocivil" role="tabpanel" hidden>
      <div class="gu-tabela-wrapper">
        <table class="gu-tabela">
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th>Estado Civil</th>
              <th class="gu-tabela__th--acoes">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-estadocivil">
            <tr><td colspan="3" class="gu-tabela__estado">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── STATUS ── -->
    <div class="tabaux__painel" id="tabaux-status" role="tabpanel" hidden>
      <div class="gu-tabela-wrapper">
        <table class="gu-tabela">
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th>Status</th>
              <th class="gu-tabela__th--acoes">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-status">
            <tr><td colspan="3" class="gu-tabela__estado">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</section>

<!-- ── Modal: Adicionar / Editar ── -->
<div class="gu-modal" id="modal-tabaux" hidden aria-modal="true" role="dialog">
  <div class="gu-modal__fundo" id="modal-tabaux-fundo"></div>
  <div class="gu-modal__caixa gu-modal__caixa--pequena">
    <div class="gu-modal__cabecalho">
      <div class="gu-modal__titulo-grupo">
        <span class="material-icons gu-modal__icone" id="modal-tabaux-icone">add_circle</span>
        <h3 class="gu-modal__titulo" id="modal-tabaux-titulo">Adicionar</h3>
      </div>
      <button type="button" class="gu-modal__fechar" id="modal-tabaux-fechar" aria-label="Fechar">
        <span class="material-icons">close</span>
      </button>
    </div>
    <form class="gu-modal__formulario" id="form-tabaux" novalidate>
      <div class="gu-campo">
        <label class="gu-campo__label" id="tabaux-label" for="tabaux-descricao">Descrição *</label>
        <input type="text" class="gu-campo__input" id="tabaux-descricao" placeholder="Digite a descrição" autocomplete="off" />
      </div>
      <div class="gu-modal__acoes">
        <button type="button" class="gu-btn gu-btn--secundario" id="modal-tabaux-cancelar">Cancelar</button>
        <button type="submit" class="gu-btn gu-btn--primario">
          <span class="material-icons">save</span> Salvar
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ── Modal: Confirmação de Exclusão ── -->
<div class="gu-modal" id="modal-tabaux-confirmar" hidden aria-modal="true" role="dialog">
  <div class="gu-modal__fundo" id="modal-confirmar-fundo"></div>
  <div class="gu-modal__caixa gu-modal__caixa--pequena">
    <div class="gu-modal__cabecalho">
      <div class="gu-modal__titulo-grupo">
        <span class="material-icons gu-modal__icone" style="color:var(--cor-erro)">delete_forever</span>
        <h3 class="gu-modal__titulo">Confirmar exclusão</h3>
      </div>
    </div>
    <div class="gu-modal__corpo">
      <p class="gu-modal__mensagem" id="modal-confirmar-msg"></p>
    </div>
    <div class="gu-modal__acoes">
      <button type="button" class="gu-btn gu-btn--secundario" id="modal-confirmar-cancelar">Cancelar</button>
      <button type="button" class="gu-btn gu-btn--perigo" id="modal-confirmar-ok">
        <span class="material-icons">delete</span> Excluir
      </button>
    </div>
  </div>
</div>
